spring:
  application:
    name: ${APP_NAME:VisionIdBackend}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
  sql:
    init:
      mode: always

server:
  servlet:
    session:
      cookie:
        same-site: strict

frontend:
  url: ${FRONTEND_URL}

jwt:
  secret: ${JWT_SECRET:PVY0kL1Hie2YCcwe64fCN3QfZI9AeJPSBf/P4pi/M9Y=}
  expiration: ${JWT_EXPIRATION:86400000}